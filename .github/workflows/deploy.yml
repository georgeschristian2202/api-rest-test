name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SERVER_HOST: ${{ vars.SERVER_HOST }}
      SERVER_USER: ${{ vars.SERVER_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/ops/deployments/api-express' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          eval "$(ssh-agent -s)"

          if [ -n "${{ secrets.SSH_PASSPHRASE }}" ]; then
            printf '%s\n' '#!/bin/sh' 'printf "%s\n" "$SSH_PASSPHRASE"' > ~/.ssh/askpass.sh
            chmod 700 ~/.ssh/askpass.sh
            export SSH_ASKPASS=~/.ssh/askpass.sh
            export SSH_PASSPHRASE="${{ secrets.SSH_PASSPHRASE }}"
            export DISPLAY=:0
            setsid ssh-add ~/.ssh/id_ed25519 < /dev/null
          else
            ssh-add ~/.ssh/id_ed25519
          fi

          loaded_key="$(ssh-add -L | head -n 1 | tr -d '\r')"
          expected_key="$(printf '%s' "${{ secrets.SSH_PUBLIC_KEY }}" | tr -d '\r')"
          if [ "$loaded_key" != "$expected_key" ]; then
            echo "SSH_PUBLIC_KEY does not match SSH_PRIVATE_KEY"
            exit 1
          fi

          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          ssh -o IdentitiesOnly=yes "$SERVER_USER@$SERVER_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az -e "ssh -o IdentitiesOnly=yes" \
            --exclude '.git/' \
            --exclude '.github/' \
            ./ "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"

          remote_cmd="set -euo pipefail; cd '$DEPLOY_PATH'; if ! command -v docker >/dev/null 2>&1; then echo 'docker is not installed on server'; exit 1; fi; if docker compose version >/dev/null 2>&1; then docker compose up -d --build --remove-orphans; elif command -v docker-compose >/dev/null 2>&1; then docker-compose up -d --build --remove-orphans; else echo 'docker compose is not installed on server'; exit 1; fi"
          ssh -o IdentitiesOnly=yes "$SERVER_USER@$SERVER_HOST" "$remote_cmd"
